<!DOCTYPE html>
<html>

<head>

<title>AI Medical Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<div class="container chat-container">

<h1>AI Skin Doctor</h1>

<div class="chat-box">

{% if answer %}

<div class="message bot">

{{answer}}

</div>

{% endif %}

</div>

<form method="POST">

<input type="text" name="question" placeholder="Ask your skin problem..." required>

<button class="chat-btn">Send</button>

</form>

</div>

</body>

</html>
